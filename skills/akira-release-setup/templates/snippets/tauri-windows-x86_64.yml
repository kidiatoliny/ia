  build-windows-x86_64:
    name: Build (windows x86_64)
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - run: pnpm install --frozen-lockfile

      - name: Tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm run tauri build --target x86_64-pc-windows-msvc

      - name: Normalize artifacts
        id: meta
        shell: bash
        env:
          APP_KEY: ${{ env.APP_KEY }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p dist
          BUNDLE_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          MSI=$(find "$BUNDLE_DIR/msi" -name '*.msi' 2>/dev/null | head -1)
          NSIS=$(find "$BUNDLE_DIR/nsis" -name '*.exe' 2>/dev/null | head -1)

          KEY_SAFE="${APP_KEY//-/_}"
          MSI_OUT="${KEY_SAFE}_${VERSION}_x86_64.msi"
          NSIS_OUT="${KEY_SAFE}_${VERSION}_x86_64-setup.exe"

          [ -n "$MSI" ]  && cp "$MSI"  "dist/${MSI_OUT}"
          [ -n "$NSIS" ] && cp "$NSIS" "dist/${NSIS_OUT}"
          [ -n "$MSI" ]  && cp "${MSI}.sig"  "dist/${MSI_OUT}.sig"  2>/dev/null || true

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows-x86_64
          path: dist/*
