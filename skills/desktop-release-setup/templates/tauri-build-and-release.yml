name: Build and Release

# Canonical Akira release workflow for Tauri apps.
# Bucket layout produced (see templates/release/publish-release.sh):
#
#   stable/latest.json
#   stable/v{VERSION}/{APP_KEY}_{VERSION}_{arch}.app.tar.gz[.sig|.dmg]
#   beta/latest.json
#   beta/v{VERSION}/...
#   nightly/latest.json
#   nightly/v{VERSION}/...
#
# Stable runs ALSO mirror to releases/latest.json so binaries that still
# poll the legacy CDN URL keep working. Channel auto-detected from tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_KEY: unified-dev               # change per repo (spectra | orbit | debugger-app | ...)
  PRODUCT_DISPLAY: Unified Dev
  S3_BUCKET: unified-dev
  S3_ENDPOINT: https://nyc3.digitaloceanspaces.com
  # Origin only, NO trailing /releases. publish-release.sh appends the path.
  CDN_BASE: https://unified-dev.nyc3.cdn.digitaloceanspaces.com

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm run tauri build --target ${{ matrix.target }}

      - name: Normalize artifacts
        id: meta
        shell: bash
        env:
          APP_KEY: ${{ env.APP_KEY }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p dist
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          TAR=$(find "$BUNDLE_DIR" -name '*.app.tar.gz' | head -1)
          DMG=$(find "$BUNDLE_DIR/dmg" -name '*.dmg' | head -1)

          KEY_SAFE="${APP_KEY//-/_}"
          TAR_OUT="${KEY_SAFE}_${VERSION}_${{ matrix.arch }}.app.tar.gz"
          DMG_OUT="${KEY_SAFE}_${VERSION}_${{ matrix.arch }}.dmg"

          cp "$TAR"       "dist/${TAR_OUT}"
          cp "${TAR}.sig" "dist/${TAR_OUT}.sig"
          cp "$DMG"       "dist/${DMG_OUT}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: dist/*

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Make publisher executable
        run: chmod +x .github/scripts/publish-release.sh

      - name: Publish to S3 + write latest.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          VERSION: ${{ needs.build.outputs.version }}
          KEY_SAFE: ${{ env.APP_KEY }}    # underscore-normalize at script side if needed
          AARCH64_BUNDLE: dist/${{ env.APP_KEY }}_${{ needs.build.outputs.version }}_aarch64.app.tar.gz
          AARCH64_DMG:    dist/${{ env.APP_KEY }}_${{ needs.build.outputs.version }}_aarch64.dmg
          X86_64_BUNDLE:  dist/${{ env.APP_KEY }}_${{ needs.build.outputs.version }}_x86_64.app.tar.gz
          X86_64_DMG:     dist/${{ env.APP_KEY }}_${{ needs.build.outputs.version }}_x86_64.dmg
        run: ./.github/scripts/publish-release.sh

      - name: Upload DMGs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
